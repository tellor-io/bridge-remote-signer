version: 2
updates:
  - package-ecosystem: github-actions
    directory: /
    schedule:
      interval: weekly

  # Go modules: security updates only.
  - package-ecosystem: gomod
    directory: /
    schedule:
      interval: weekly
    open-pull-requests-limit: 0

  - package-ecosystem: gomod
    directory: /api
    schedule:
      interval: weekly
    open-pull-requests-limit: 0
