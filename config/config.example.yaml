# bridge-signer configuration
# Copy to config.yaml and fill in your values.
# Never commit config.yaml.

# chain_id: the cosmos chain ID. Top-level (NOT under consensus) so it can be
# served via GetChainID even when consensus signing is off. Required when
# consensus.key_file is set.
chain_id: layertest-5

signer:
  # backend selects the signing backend: "file" or "fortanixdsm".
  backend: file

  # --- file backend ---
  keyring_dir: /etc/bridge-signer/keyring
  key_name: my-bridge-key

  # password_file, optional file containing the keyring password.
  # password_file: /etc/bridge-signer/pw

  # --- fortanixdsm backend ---
  # dsm_api_endpoint: https://amer.smartkey.io
  # dsm_api_key: your-api-key
  # dsm_key_id: your-key-id (UUID format)
  # dsm_key_name: my-bridge-key

server:
  # listen_addr: gRPC server listen address
  listen_addr: "0.0.0.0:9191"
  health_addr: "0.0.0.0:9192"
  # request_timeout: max time for a single RPC call
  request_timeout: 2s
  # max_recv_msg_size: max inbound message size in bytes
  max_recv_msg_size: 1048576  # 1MB

  # allowed_msg_types: the allowlist of Cosmos message type_urls SignTx accepts.
  # Empty => SignTx rejects everything. Authorization is by OPERATION: the signer
  # is capable of ONLY four operations — attestations (SignOracleAttestation),
  # block signing (consensus privval), reports + unjail (SignTx, scoped here).
  # Scope this list to exactly the report/unjail messages the reporter must sign.
  allowed_msg_types:
    - /layer.oracle.MsgSubmitValue
    - /cosmos.slashing.v1beta1.MsgUnjail
    - /layer.reporter.MsgUnjailReporter

  # checkpoint_guard_state_file: path persisting the SignBridgeCheckpoint
  # monotonic replay guard across restarts. Defaults to
  # bridge_checkpoint_state.json next to consensus.state_file. REQUIRED when
  # consensus signing is off (a memory-only guard would reset on restart),
  # unless sign_bridge_checkpoint is disabled below.
  # checkpoint_guard_state_file: /data/bridge_checkpoint_state.json

  # enabled_rpcs: turn RPCs off without a rebuild (value false => Unimplemented).
  # The blind primitives Sign (65-byte) and SignRaw (64-byte) are ALWAYS disabled
  # in code regardless of this map — only the recompute-and-verify operations
  # (SignBridgeCheckpoint, SignOracleAttestation) and the scoped SignTx can sign.
  # enabled_rpcs:
  #   sign_tx: false

  # enable_reflection: gRPC server reflection. Lets any client enumerate the
  # signing RPCs — keep false in production.
  enable_reflection: false

tls:
  # mTLS still secures the transport (the client must present a cert chained to
  # this CA), but authorization is by OPERATION, not by client-cert CN. There are
  # no per-cert *_allowed_cns knobs anymore: the signer can perform ONLY its four
  # fixed operations and the blind primitives are hard-disabled.
  # CA certificate used to verify the client certificate
  ca_cert: /etc/bridge-signer/tls/ca.crt
  # Sidecar's own TLS certificate and key
  server_cert: /etc/bridge-signer/tls/server.crt
  server_key:  /etc/bridge-signer/tls/server.key

logging:
  # level: debug | info | warn | error
  level: info
  # format: json (production) | text (development)
  format: json

consensus:
  key_file: /keys/priv_validator_key.json
  state_file: /data/priv_validator_state.json
  conn_key_file: /data/connection.key
  targets: tcp://layer:26659,tcp://layer-backup:26659
