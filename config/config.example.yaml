# bridge-signer configuration
# Copy to config.yaml and fill in your values.
# Never commit config.yaml.

signer:
  # backend selects the signing backend: "file" or "fortanixdsm".
  backend: file

  # --- file backend ---
  keyring_dir: /etc/bridge-signer/keyring
  key_name: my-bridge-key

  # password_file, optional file containing the keyring password.
  # password_file: /etc/bridge-signer/pw

  # --- fortanixdsm backend ---
  # dsm_api_endpoint: https://amer.smartkey.io
  # dsm_api_key: your-api-key
  # dsm_key_id: your-key-id (UUID format)
  # dsm_key_name: my-bridge-key

server:
  # listen_addr: gRPC server listen address
  listen_addr: "0.0.0.0:9191"
  health_addr: "0.0.0.0:9192"
  # request_timeout: max time for a single RPC call
  request_timeout: 2s
  # max_recv_msg_size: max inbound message size in bytes
  max_recv_msg_size: 1048576  # 1MB

tls:
  # CA certificate used to verify the validator's client certificate
  ca_cert: /etc/bridge-signer/tls/ca.crt
  # Sidecar's own TLS certificate and key
  server_cert: /etc/bridge-signer/tls/server.crt
  server_key:  /etc/bridge-signer/tls/server.key

logging:
  # level: debug | info | warn | error
  level: info
  # format: json (production) | text (development)
  format: json